    x="0" y="30"
    font-family="DM Sans, ui-sans-serif, system-ui, sans-serif"
    font-size="13"
    font-weight="300"
    letter-spacing="2.5"
    fill="currentColor"
    opacity="0.85"
  >THE</text>

  <!-- "MOLE" — bold, larger, tracking -->
  <text
    x="0" y="44"
    font-family="DM Sans, ui-sans-serif, system-ui, sans-serif"
